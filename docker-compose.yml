# ═══════════════════════════════════════════════════════
# Site Monitor - Docker Compose 部署配置
# ═══════════════════════════════════════════════════════
#
# 适用场景:
#   - NAS (群晖/威联通/QNAP)
#   - VPS / 云服务器
#   - 本地开发调试
#
# 使用方式:
#   1. 修改 config.py 中的 SITES 和告警配置
#   2. 配置告警 Webhook (见下方注释)
#   3. 运行: docker compose up -d
#

services:
  site-monitor:
    build: .
    container_name: site-monitor
    restart: unless-stopped

    # ── Docker Socket 挂载 (可选, 用于容器状态检测) ──────────
    # 如果不需要监控宿主机上的其他容器, 可以注释掉这行
    #
    # 注意: 不要 bind mount ./config.py 覆盖容器内 /app/config.py
    #       历史上因此触发 ImportError (见 CI Test module imports 步骤)
    #       如需自定义配置, 改用环境变量 / env_file 注入, 详见 README
    volumes:
      - ./data:/data                         # 状态持久化
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker Socket (只读)

    # ── 环境变量 (可选, 优先级高于 config.py) ────────────────
    environment:
      # Python 日志级别
      - PYTHONUNBUFFERED=1                    # 实时输出日志
      # - LOG_LEVEL=DEBUG                     # 调试模式

    # ── 资源限制 (可选) ──────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
        reservations:
          cpus: "0.1"
          memory: "64M"

    # ── 健康检查 ─────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # ── 网络 (按需) ──────────────────────────────────────────
    # networks:
    #   - monitor-net

# ── 外部网络 (如需跨 Docker 网络访问) ────────────────────────
# networks:
#   monitor-net:
#     driver: bridge
