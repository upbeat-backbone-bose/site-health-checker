name: Sync README

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to sync (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  sync:
    name: Update badges in README
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Syncing README to ${VERSION}"

      - name: Update version badge in README
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DISPLAY="${VERSION#v}"
          sed -i "s|https://img.shields.io/badge/version-.*-blue|https://img.shields.io/badge/version-v${DISPLAY}-blue|g" README.md
          sed -i "s|releases/tag/v[0-9.]*|releases/tag/${VERSION}|g" README.md

      - name: Commit and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs(readme): sync version to ${VERSION} [skip ci]"
          git push