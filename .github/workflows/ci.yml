name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: Test Python runtime
        run: docker run --rm site-monitor:test python3 -c "import sys; print('PYTHON_OK', flush=True)"

      - name: Test module imports
        run: |
          docker run --rm site-monitor:test python3 -u -c "
          import sys
          sys.path.insert(0, '/app')
          import config
          import monitor
          import alert
          print('IMPORTS_OK', flush=True)
          "

      - name: Test service startup
        run: |
          # 1. 验证 loop.py 文件存在
          echo "=== Verify image content ==="
          docker run --rm site-monitor:test ls -la /app/loop.py

          # 2. 启动容器并立即测端口
          echo "=== Start container and check ==="
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 site-monitor:test
          sleep 2

          # 3. 3秒后看状态和日志
          echo "=== After 2s ==="
          docker inspect sm-test --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          echo "--- container logs ---"
          docker logs sm-test 2>&1 | head -50
          echo "--- end logs ---"

          # 4. 等待并测健康检查
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; then
              echo "✅ Health check ready in ${i}s"
              curl -sf http://127.0.0.1:8080/health
              echo ""
              docker stop sm-test
              exit 0
            fi
            sleep 1
          done

          echo "❌ TIMEOUT"
          docker logs sm-test 2>&1
          docker inspect sm-test --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          docker stop sm-test
          exit 1