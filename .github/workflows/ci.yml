name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: Test Python runtime
        run: docker run --rm site-monitor:test python3 -c "import sys; print('PYTHON_OK', flush=True)"

      - name: Test module imports
        run: |
          docker run --rm site-monitor:test python3 -u -c "
          import sys
          sys.path.insert(0, '/app')
          import config
          import monitor
          import alert
          print('IMPORTS_OK', flush=True)
          "

      - name: Test service startup
        run: |
          # 先用 foreground 模式跑一下，看实际输出
          echo "=== Foreground test (10s timeout) ==="
          timeout 10 docker run --rm -p 127.0.0.1:8080:8080 site-monitor:test 2>&1 | head -50 || echo "(exit $?)"
          echo "=== Foreground test done ==="
          echo ""
          # 现在用 detached 模式跑（模拟原行为）
          echo "=== Detached mode ==="
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 site-monitor:test
          sleep 3
          echo "=== 3s 后日志 ==="
          docker logs sm-test 2>&1 | head -30
          echo "=== 容器状态 ==="
          docker inspect sm-test --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          docker stop sm-test 2>/dev/null