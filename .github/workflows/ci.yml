name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  # ── Python 测试 ───────────────────────────────────────────
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ── Docker 构建验证 (不推送) ─────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: Run container health check
        run: |
          # 先检查端口是否已被占用
          if ss -tlnp 2>/dev/null | grep -q ':8080'; then
            echo "⚠️  端口 8080 已被占用，尝试清理..."
            fuser -k 8080/tcp 2>/dev/null || true
            sleep 2
          fi

          # 启动容器
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 \
            --init \
            site-monitor:test 2>&1
          CONTAINER_ID=$(docker ps -lq --format "{{.ID}}")
          echo "容器ID: $CONTAINER_ID"

          # 等健康检查服务就绪 (最多 30s)
          for i in $(seq 1 30); do
            if resp=$(curl -sf http://127.0.0.1:8080/health 2>/dev/null); then
              echo "✅ 健康检查就绪 (${i}s)"
              echo "   响应: $resp"
              docker stop sm-test
              exit 0
            fi
            # 每 5 秒打印容器日志用于诊断
            if [ $((i % 5)) -eq 0 ]; then
              echo "   [${i}s] 容器状态: $(docker inspect -f '{{.State.Status}}' sm-test 2>/dev/null || echo 'unknown')"
            fi
            sleep 1
          done

          echo "❌ 健康检查超时，打印容器日志:"
          docker logs sm-test 2>&1
          docker inspect sm-test --format='Status: {{.State.Status}}, ExitCode: {{.State.ExitCode}}' 2>&1
          docker stop sm-test 2>/dev/null
          exit 1
