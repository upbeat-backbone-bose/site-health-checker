name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: Test module imports
        # 回归保护: 必须验证具体导出名 (config / SITES)
        # 仅 import config 不够 — 历史上因为 docker-compose bind mount 覆盖
        # /app/config.py 导致运行时 'from config import config, SITES' 失败
        # 详见: docker-compose.yml volumes 注释
        run: |
          docker run --rm site-monitor:test python3 -u -c "
          from config import config, SITES
          from monitor import check_all, CheckResult, SiteStatus
          from alert import send_alert, AlertState
          from app import app
          assert hasattr(config, 'alert'), 'config.alert 缺失'
          assert hasattr(config, 'l7'), 'config.l7 缺失'
          assert len(SITES) >= 1, 'SITES 为空'
          print(f'IMPORTS_OK sites={len(SITES)}', flush=True)
          "

      - name: Test service health
        run: |
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 site-monitor:test
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1; then
              echo "Health check ready in ${i}s"
              curl -sf http://127.0.0.1:8080/health
              echo ""
              curl -sf http://127.0.0.1:8080/metrics | head -5
              docker stop sm-test
              exit 0
            fi
            sleep 1
          done
          echo "TIMEOUT"
          docker logs sm-test
          docker stop sm-test
          exit 1