name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  test:
    name: Test Python 3.12
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: Test1 - Python runtime
        run: docker run --rm site-monitor:test python3 -c "import sys; print('PY_OK', flush=True)"

      - name: Test2 - Module imports
        run: |
          docker run --rm site-monitor:test python3 -u -c "
import sys
sys.stderr.write('===START===\n'); sys.stderr.flush()
sys.path.insert(0, '/app')
sys.stderr.write('import config...'); sys.stderr.flush()
import config
sys.stderr.write('OK\n'); sys.stderr.flush()
sys.stderr.write('import monitor...'); sys.stderr.flush()
import monitor
sys.stderr.write('OK\n'); sys.stderr.flush()
sys.stderr.write('import alert...'); sys.stderr.flush()
import alert
sys.stderr.write('OK\n'); sys.stderr.flush()
sys.stderr.write('===DONE===\n'); sys.stderr.flush()
"

      - name: Test3 - Service startup
        run: |
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 site-monitor:test
          for i in $(seq 1 30); do
            if resp=$(curl -sf http://127.0.0.1:8080/health 2>/dev/null); then
              echo "Health check ready (${i}s): $resp"
              docker stop sm-test
              exit 0
            fi
            sleep 1
          done
          echo "TIMEOUT - container logs:"
          docker logs sm-test
          docker inspect sm-test --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          docker stop sm-test
          exit 1
