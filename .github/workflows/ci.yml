name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  DOCKER_BUILDKIT: "1"

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: site-monitor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: docker images site-monitor:test --format "{{.Repository}}:{{.Tag}}"

      - name: "Step 1: 镜像基础测试 (busybox echo)"
        run: docker run --rm --name smoke-test busybox echo "IMAGING_OK"

      - name: "Step 2: 模块导入测试 (imports + flush)"
        run: |
          docker run --rm site-monitor:test python3 -u -c "
import sys
sys.stderr.write('=== PYTHON OK ===\n'); sys.stderr.flush()
sys.path.insert(0, '/app')
sys.stderr.write('importing config...\n'); sys.stderr.flush()
import config; sys.stderr.write('config OK\n'); sys.stderr.flush()
import monitor; sys.stderr.write('monitor OK\n'); sys.stderr.flush()
import alert; sys.stderr.write('alert OK\n'); sys.stderr.flush()
sys.stderr.write('=== ALL IMPORTS DONE ===\n'); sys.stderr.flush()
"

      - name: "Step 3: 启动并立即打印日志 (诊断 0 输出问题)"
        run: |
          docker run -d --name sm-diag -p 127.0.0.1:8080:8080 site-monitor:test
          sleep 3
          echo "=== 容器日志 ==="
          docker logs sm-diag 2>&1
          echo "=== 容器状态 ==="
          docker inspect sm-diag --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          docker stop sm-diag

      - name: "Step 4: 启动服务并等待健康检查"
        run: |
          docker run -d --name sm-test -p 127.0.0.1:8080:8080 site-monitor:test
          for i in $(seq 1 30); do
            if resp=$(curl -sf http://127.0.0.1:8080/health 2>/dev/null); then
              echo "健康检查就绪 (${i}s): $resp"
              docker stop sm-test
              exit 0
            fi
            sleep 1
          done
          echo "健康检查超时，打印容器日志:"
          docker logs sm-test 2>&1
          docker inspect sm-test --format='Status={{.State.Status}} ExitCode={{.State.ExitCode}}'
          docker stop sm-test
          exit 1
